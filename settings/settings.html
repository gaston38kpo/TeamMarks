<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="settings.css">
    <title>TeamMarks — Ajustes</title>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="app-header__logo">T</div>
            <div>
                <h1 class="app-header__title">TeamMarks</h1>
                <p class="app-header__subtitle">Sync bookmarks with your team</p>
            </div>
        </header>

        <!-- Auth Section -->
        <section id="auth-section" class="section">
            <div class="section__header">
                <h2 class="section__title">Cuenta</h2>
                <span id="auth-badge" class="section__badge section__badge--error">No conectado</span>
            </div>

            <!-- Signed out -->
            <div id="auth-signed-out">
                <p style="font-size:14px; color:var(--color-text-secondary); margin-bottom:16px;">
                    Iniciá sesión con tu cuenta de Google para sincronizar marcadores con tu equipo.
                </p>
                <button id="btn-sign-in" class="btn btn--primary">Iniciar sesión con Google</button>
            </div>

            <!-- Signed in -->
            <div id="auth-signed-in" style="display:none;">
                <div class="auth-section__user">
                    <div id="user-avatar" class="auth-section__avatar">?</div>
                    <div class="auth-section__info">
                        <div id="user-name" class="auth-section__name"></div>
                        <div id="user-email" class="auth-section__email"></div>
                    </div>
                </div>
                <div class="auth-section__actions">
                    <button id="btn-sign-out" class="btn btn--danger">Cerrar sesión</button>
                </div>
            </div>
        </section>

        <!-- Team Management Section (shown when signed in) -->
        <section id="team-section" class="section" style="display:none;">
            <div class="section__header">
                <h2 class="section__title">Mis teams</h2>
            </div>

            <!-- Team list -->
            <div id="team-list-container">
                <div class="loading-state">
                    <span class="spinner"></span> Cargando teams…
                </div>
            </div>

            <hr class="divider">

            <!-- Create Team -->
            <h3 style="font-size:14px; font-weight:600; margin-bottom:8px;">Crear un team</h3>
            <div class="form-group">
                <div class="form-row">
                    <input id="input-team-name" class="input" type="text" placeholder="Nombre del team" maxlength="60">
                    <button id="btn-create-team" class="btn btn--primary">Crear</button>
                </div>
            </div>

            <hr class="divider">

            <!-- Join Team -->
            <h3 style="font-size:14px; font-weight:600; margin-bottom:8px;">Unirse a un team</h3>
            <div class="form-group">
                <div class="form-row">
                    <input id="input-invite-code" class="input input--code" type="text" placeholder="Código de invitación" maxlength="10">
                    <button id="btn-join-team" class="btn btn--secondary">Unirse</button>
                </div>
            </div>
        </section>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="settings.js"></script>
</body>
</html>
