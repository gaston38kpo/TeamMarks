<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
    <title>TeamMarks</title>
</head>
<body>
    <!-- Header -->
    <header class="popup-header">
        <div class="popup-header__logo">T</div>
        <div>
            <div class="popup-header__title">TeamMarks</div>
            <div class="popup-header__subtitle">Bookmark sync for teams</div>
        </div>
    </header>

    <!-- Content -->
    <div class="popup-content">
        <!-- Auth status (shown when signed in) -->
        <div id="auth-signed-in" style="display:none;">
            <div class="auth-bar">
                <div id="user-avatar" class="auth-bar__avatar">?</div>
                <div class="auth-bar__info">
                    <div id="user-name" class="auth-bar__name"></div>
                    <div id="user-email" class="auth-bar__email"></div>
                </div>
            </div>

            <!-- Team switcher -->
            <div id="team-switcher" class="team-switcher" style="display:none;">
                <div class="team-switcher__label">Active Team</div>
                <select id="team-select" class="team-switcher__select">
                    <option value="">Select a team…</option>
                </select>
            </div>

            <!-- Sync status -->
            <div id="sync-status" class="status-card">
                <div class="status-row">
                    <span class="status-row__label">Connection</span>
                    <span id="connection-status" class="status-row__value">
                        <span class="connection-badge connection-badge--offline">
                            <span class="connection-badge__dot"></span>
                            Offline
                        </span>
                    </span>
                </div>
                <div class="status-row">
                    <span class="status-row__label">Last synced</span>
                    <span id="last-sync" class="status-row__value">Never</span>
                </div>
                <div class="status-row">
                    <span class="status-row__label">Contribution folder</span>
                    <span class="status-row__right">
                        <span id="sync-folder" class="status-row__value">Not set</span>
                        <button id="btn-refresh-folder" class="btn-icon" title="Refresh sync folder">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                                <path d="M21 3v5h-5"/>
                                <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                                <path d="M3 21v-5h5"/>
                            </svg>
                        </button>
                    </span>
                </div>
            </div>

            <!-- Error display -->
            <div id="error-display" class="error-banner" style="display:none;"></div>

            <!-- Quick actions -->
            <div class="quick-actions">
                <button id="btn-sync-now" class="btn btn--primary">Sync Now</button>
                <button id="btn-settings" class="btn btn--secondary">Settings</button>
            </div>
        </div>

        <!-- Signed out state -->
        <div id="auth-signed-out">
            <div class="auth-bar__signed-out">
                <p>Sign in to sync bookmarks with your team</p>
                <button id="btn-sign-in" class="btn btn--primary btn--full">Sign in with Google</button>
            </div>
        </div>

        <!-- Loading state -->
        <div id="popup-loading" class="loading-state" style="display:none;">
            <span class="spinner"></span> Loading…
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
